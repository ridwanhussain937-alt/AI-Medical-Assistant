<div class="form-field">
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
        <p class="help-text">{{ field.help_text }}</p>
    {% endif %}
    {% if field.errors %}
        <div class="error">{{ field.errors|striptags }}</div>
    {% endif %}
</div>
